<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Layout</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">

    <div class="container nav-container">

      <div class="logo">
        JHAYLEOO
      </div>

      <nav>
        <ul class="nav-links">
          <li><a href="#">HOME</a></li>
          <li><a href="#">Navage</a></li>
          <li><a href="#">LINKS</a></li>
          <li><a href="#">CONTACT</a></li>
        </ul>
      </nav>

    </div>

  </header>

  <!-- HERO -->
  <section class="hero">

    <div class="container hero-container">

      <h1>JHAYLEOO fashion</h1>

      <div class="hero-line"></div>

      <button>CALL TO ACTION</button>

    </div>

  </section>

  <!-- CONTENT GRID -->
  <section class="content">

    <div class="container grid">

      <article class="card">
        <div class="card-image"> </div>
        
        <p>Negotiations</p>
      </article>

      <article class="card">
        <div class="card-image1"></div>
        <p>shirts</p>
      </article>

      <article class="card">
        <div class="card-image2"></div>
        
        <p>Wardrobe</p>
      </article>

      <article class="card">
        <div class="card-image3"></div>
        
        <p>T-shirt</p>
      </article>

      <article class="card">
        <div class="card-image4"></div>
       
        <p>Suits</p>
      </article>

      <article class="card">
        <div class="card-image5"></div>
       
        <p>Jean trousers</p>
      </article>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="container footer-container">

      <div class="footer-column">
        <h3>JHAYLEOO enterprise</h3>
        <p>Blog</p>
        <p>Refer a friend</p>

      </div>

      <div class="footer-column">
        <h3>Careers</h3>
        <p>impact</p>
        <p>legal</p>

      </div>

      <div class="footer-column">
        <h3>For commercial</h3>
        <p>partner with us</p>
      </div>

      <div class="footer-column">
        <h3>Help center</h3>
        <a href="" class="link"><p>sign in</p></a>
      </div>

    </div>

  </footer>

</body>
</html>
