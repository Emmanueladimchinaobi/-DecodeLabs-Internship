<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Layout</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">

    <div class="container nav-container">

      <div class="logo">
        LOGO container
      </div>

      <nav>
        <ul class="nav-links">
          <li><a href="#">HOME</a></li>
          <li><a href="#">ABOUT</a></li>
          <li><a href="#">LINKS</a></li>
          <li><a href="#">CONTACT</a></li>
        </ul>
      </nav>

    </div>

  </header>

  <!-- HERO -->
  <section class="hero">

    <div class="container hero-container">

      <h1>Main Headline</h1>

      <div class="hero-line"></div>

      <button>CALL TO ACTION</button>

    </div>

  </section>

  <!-- CONTENT GRID -->
  <section class="content">

    <div class="container grid">

      <article class="card">
        <div class="card-image"> </div>
        
        <p>Text</p>
      </article>

      <article class="card">
        <div class="card-image"></div>
        <p>Text</p>
      </article>

      <article class="card">
        <div class="card-image"></div>
        
        <p>Text</p>
      </article>

      <article class="card">
        <div class="card-image"></div>
        
        <p>Text</p>
      </article>

      <article class="card">
        <div class="card-image"></div>
       
        <p>Text</p>
      </article>

      <article class="card">
        <div class="card-image"></div>
       
        <p>Text</p>
      </article>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="container footer-container">

      <div class="footer-column">
        <h3>Footer Block</h3>
        <p>Footer content</p>
      </div>

      <div class="footer-column">
        <h3>Footer Block</h3>
        <p>Footer content</p>
      </div>

      <div class="footer-column">
        <h3>Footer Block</h3>
        <p>Footer content</p>
      </div>

      <div class="footer-column">
        <h3>Footer Block</h3>
        <p>Footer content</p>
      </div>

    </div>

  </footer>

</body>
</html>
